name: Dependency Audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "18 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "24"

jobs:
  # Audits EVERY package tree in the repo, not just the root — sub-trees are
  # otherwise invisible to CI until Dependabot flags them.
  # - Root (`.`) audits prod deps only (`--omit=dev`); the dev tree doesn't
  #   ship to Vercel.
  # - Worker trees audit dev deps too: their real attack surface (wrangler,
  #   build tooling) lives in devDependencies.
  audit:
    name: npm audit (${{ matrix.tree.dir }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        tree:
          - { dir: ".", flags: "--omit=dev" }
          - { dir: "workers/apply-arm", flags: "" }
          - { dir: "workers/ingest", flags: "" }
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit
        working-directory: ${{ matrix.tree.dir }}
        run: npm audit ${{ matrix.tree.flags }} --audit-level=high
